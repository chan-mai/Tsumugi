name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: npm install -g npm@12
      - run: pnpm install --frozen-lockfile

      # タグとpackage.jsonのversionがずれたまま公開すると取り消せない
      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./packages/tsumugi/package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package version $pkg"
            exit 1
          fi
          echo "publishing $pkg"

      # CIと同じ検査, タグを打った時点で壊れていないことを確かめてから公開する
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm test:unit
      - run: pnpm test:workers
      - run: pnpm build
      - run: pnpm --filter tsumugi check:pack
      - run: pnpm --filter tsumugi check:size

      # Trusted Publishingで公開
      # READMEとLICENSEはprepackがルートから複写
      # publishだけnpm CLIを使う
      # Trusted PublishingのOIDC交換はnpm固有で,pnpm publishが同じ経路を通る確証がない
      - name: Publish to npm
        run: npm publish --access public
        working-directory: packages/tsumugi

      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
